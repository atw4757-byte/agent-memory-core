# CI — archon-memory-core
# Runs on push to main and on all pull requests.
# Installs with all optional extras and runs the existing test suite.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with all optional extras
        run: pip install -e ".[reranker,graph,dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short
